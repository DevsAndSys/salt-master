name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
      IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
      MIRROR_IMAGE_REGISTRY: ${{ vars.MIRROR_IMAGE_REGISTRY }}
      MIRROR_IMAGE_REPOSITORY: ${{ vars.MIRROR_IMAGE_REPOSITORY }}
      IMAGE_REGISTRY_USERNAME: ${{ secrets.IMAGE_REGISTRY_USERNAME }}
      IMAGE_REGISTRY_PASSWORD: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}
      MIRROR_IMAGE_REGISTRY_USERNAME: ${{ secrets.MIRROR_IMAGE_REGISTRY_USERNAME }}
      MIRROR_IMAGE_REGISTRY_PASSWORD: ${{ secrets.MIRROR_IMAGE_REGISTRY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next semver patch
        id: semver
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          base="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${base}"
          next_patch=$((patch + 1))
          next_tag="v${major}.${minor}.${next_patch}"

          echo "latest=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${next_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Create and push semver tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.semver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute publish targets
        id: targets
        shell: bash
        run: |
          set -euo pipefail
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          primary_registry="${IMAGE_REGISTRY:-ghcr.io}"
          primary_repo="${IMAGE_REPOSITORY:-${repo_lc}}"
          primary_image="${primary_registry}/${primary_repo}"

          mirror_enabled="false"
          mirror_image=""
          if [[ -n "${MIRROR_IMAGE_REGISTRY:-}" || -n "${MIRROR_IMAGE_REPOSITORY:-}" ]]; then
            if [[ -z "${MIRROR_IMAGE_REGISTRY:-}" || -z "${MIRROR_IMAGE_REPOSITORY:-}" ]]; then
              echo "::error::Set both MIRROR_IMAGE_REGISTRY and MIRROR_IMAGE_REPOSITORY, or neither."
              exit 1
            fi
            mirror_enabled="true"
            mirror_image="${MIRROR_IMAGE_REGISTRY}/${MIRROR_IMAGE_REPOSITORY}"
          fi

          version="${{ steps.semver.outputs.version }}"
          tag="${{ steps.semver.outputs.tag }}"
          latest_enabled="false"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            latest_enabled="true"
          fi

          tags=(
            "${primary_image}:${version}"
            "${primary_image}:${tag}"
          )
          if [[ "${latest_enabled}" == "true" ]]; then
            tags+=("${primary_image}:latest")
          fi

          if [[ "${mirror_enabled}" == "true" ]]; then
            tags+=("${mirror_image}:${version}")
            tags+=("${mirror_image}:${tag}")
            if [[ "${latest_enabled}" == "true" ]]; then
              tags+=("${mirror_image}:latest")
            fi
          fi

          {
            echo "primary_image=${primary_image}"
            echo "mirror_enabled=${mirror_enabled}"
            echo "mirror_image=${mirror_image}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in primary registry
        shell: bash
        run: |
          set -euo pipefail
          registry="${{ steps.targets.outputs.primary_image }}"
          registry="${registry%%/*}"
          if [[ "${registry}" == "ghcr.io" ]]; then
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${registry}" --username "${{ github.actor }}" --password-stdin
          else
            if [[ -z "${IMAGE_REGISTRY_USERNAME:-}" || -z "${IMAGE_REGISTRY_PASSWORD:-}" ]]; then
              echo "::error::Set IMAGE_REGISTRY_USERNAME and IMAGE_REGISTRY_PASSWORD for non-GHCR primary registry."
              exit 1
            fi
            echo "${IMAGE_REGISTRY_PASSWORD}" | docker login "${registry}" --username "${IMAGE_REGISTRY_USERNAME}" --password-stdin
          fi

      - name: Log in mirror registry
        if: ${{ steps.targets.outputs.mirror_enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          registry="${{ steps.targets.outputs.mirror_image }}"
          registry="${registry%%/*}"
          if [[ -z "${MIRROR_IMAGE_REGISTRY_USERNAME:-}" || -z "${MIRROR_IMAGE_REGISTRY_PASSWORD:-}" ]]; then
            echo "::error::Set MIRROR_IMAGE_REGISTRY_USERNAME and MIRROR_IMAGE_REGISTRY_PASSWORD when mirror image publish is enabled."
            exit 1
          fi
          echo "${MIRROR_IMAGE_REGISTRY_PASSWORD}" | docker login "${registry}" --username "${MIRROR_IMAGE_REGISTRY_USERNAME}" --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.targets.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write release summary
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.targets.outputs.primary_image }}"
          mirror_enabled="${{ steps.targets.outputs.mirror_enabled }}"
          mirror_image="${{ steps.targets.outputs.mirror_image }}"
          tag="${{ steps.semver.outputs.tag }}"
          version="${{ steps.semver.outputs.version }}"
          {
            echo "## Docker release summary"
            echo
            echo "- Primary image: \`${image}\`"
            if [[ "${mirror_enabled}" == "true" ]]; then
              echo "- Mirror image: \`${mirror_image}\`"
            fi
            echo "- Released tag: \`${tag}\`"
            echo "- Version: \`${version}\`"
            echo "- Mutable tag also updated: \`latest\`"
            echo
            echo "### Deterministic deploy pin"
            echo
            echo '```bash'
            echo "helm upgrade --install salt-master ./helm/salt-master \\"
            echo "  --set image.repository=${image} \\"
            echo "  --set image.tag=${tag}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
