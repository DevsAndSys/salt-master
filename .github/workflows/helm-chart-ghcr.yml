name: Package and Push Helm Chart (GHCR OCI)

on:
  push:
    branches:
      - main
    paths:
      - "helm/salt-master/**"
      - ".github/workflows/helm-chart-ghcr.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Normalize GHCR owner
        id: owner
        shell: bash
        run: |
          echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (OCI)
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Lint and package chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          helm lint ./helm/salt-master
          helm package ./helm/salt-master --destination ./dist

      - name: Push chart to GHCR OCI
        shell: bash
        run: |
          set -euo pipefail
          chart_pkg="$(ls -1 ./dist/salt-master-*.tgz | head -n1)"
          helm push "${chart_pkg}" "oci://ghcr.io/${{ steps.owner.outputs.value }}/charts"
