# Public-safe example values for this chart.
# - No real hostnames, repos, tokens, or usernames.
# - All secret references point to placeholder Secret names/keys.

replicaCount: 1
fullnameOverride: salt-master

image:
  repository: ghcr.io/example-org/salt-master
  tag: vX.Y.Z
  pullPolicy: IfNotPresent

config:
  mode: external
  external:
    source: configMap
    configMap:
      create: true
      name: salt-master-config
      key: master
      optional: false
      data: |
        user: salt
        interface: 0.0.0.0
        publish_port: 30505
        ret_port: 30506
        worker_threads: 5
        log_level: info
        log_file: /dev/stdout
        log_level_logfile: info
        auto_accept: false
        pki_dir: /var/lib/salt/pki/master
        sock_dir: /var/lib/salt/run/master
        pidfile: /var/lib/salt/run/salt-master.pid
        max_open_files: 64000
        extension_modules: "/var/lib/salt/extmods"
        id: salt-master-0.salt-master-headless.salt-master.svc.cluster.local
        file_roots:
          localtesting:
            - "/var/lib/salt/localtesting"
        fileserver_backend:
          - gitfs
          - file
        gitfs_provider: gitpython
        gitfs_base: main
        gitfs_root: base
        gitfs_remotes:
          - ssh://git@github.com/example-org/salt-states.git
        gitfs_saltenv_whitelist:
          - "base"
          - "dev"
          - "pr-*"
        ext_pillar:
          - git:
            - "main ssh://git@github.com/example-org/salt-states.git":
                - root: "pillar"
                - env: "base"
        gpg_keydir: "/var/lib/salt/gpgkeys"
        gpg_decrypt_must_succeed: true
        reactor:
          - "salt/job/*/new":
            - "salt://reactor/pr_highstate_guard.sls"

volumePermissions:
  enabled: true
  securityContext:
    runAsUser: 0
    runAsGroup: 0

readinessProbe:
  enabled: true
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1
  command:
    - sh
    - -ec
    - gpg --homedir /var/lib/salt/gpgkeys --list-secret-keys --with-colons | grep -q '^sec:'

service:
  type: NodePort
  internalPublishPort: 30505
  internalReturnPort: 30506
  nodePort:
    enabled: true
    publish: 30505
    return: 30506

persistence:
  pki:
    enabled: true
    existingClaim: salt-master-pki

runtime:
  extmodsEmptyDir:
    enabled: true

extraEnv:
  - name: CLOUD_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: salt-master-cloud-api
        key: CLOUD_API_TOKEN
  - name: DNS_API_URL
    valueFrom:
      secretKeyRef:
        name: salt-master-dns-api
        key: DNS_API_URL
  - name: DNS_API_USERNAME
    valueFrom:
      secretKeyRef:
        name: salt-master-dns-api
        key: DNS_API_USERNAME
  - name: DNS_API_PASSWORD
    valueFrom:
      secretKeyRef:
        name: salt-master-dns-api
        key: DNS_API_PASSWORD
  - name: DNS_API_DOMAIN
    valueFrom:
      secretKeyRef:
        name: salt-master-dns-api
        key: DNS_API_DOMAIN

extraVolumes:
  - name: minions
    persistentVolumeClaim:
      claimName: salt-master-minions
  - name: pki-master
    persistentVolumeClaim:
      claimName: salt-master-keys
  - name: localtesting
    persistentVolumeClaim:
      claimName: salt-master-localtesting
  - name: gitfs-ssh
    secret:
      secretName: salt-master-gitfs-ssh
      defaultMode: 0400
  - name: gpg-keyring-src
    secret:
      secretName: salt-master-gpg-keyring
  - name: gpg-keyring-runtime
    emptyDir: {}

extraVolumeMounts:
  - name: pki-master
    mountPath: /var/lib/salt/pki/master
    subPath: masterdata
  - name: minions
    mountPath: /var/lib/salt/pki/master/minions
  - name: localtesting
    mountPath: /var/lib/salt/localtesting
  - name: gitfs-ssh
    mountPath: /var/lib/salt/.ssh
    readOnly: true
  - name: gpg-keyring-src
    mountPath: /var/lib/salt/gpgkeys-src
    readOnly: true
  - name: gpg-keyring-runtime
    mountPath: /var/lib/salt/gpgkeys

extraInitContainers:
  - name: gpg-keyring-prepare
    image: ghcr.io/example-org/salt-master:vX.Y.Z
    imagePullPolicy: IfNotPresent
    command:
      - sh
      - -ec
      - |
        cp -f /var/lib/salt/gpgkeys-src/* /var/lib/salt/gpgkeys/
        chmod 0600 /var/lib/salt/gpgkeys/* || true
        chown 10001:10001 /var/lib/salt/gpgkeys/* || true
        gpg --homedir /var/lib/salt/gpgkeys --batch --import \
          /var/lib/salt/gpgkeys/gpgkeys.secret \
          /var/lib/salt/gpgkeys/gpgkeys.pub.asc
    volumeMounts:
      - name: gpg-keyring-src
        mountPath: /var/lib/salt/gpgkeys-src
        readOnly: true
      - name: gpg-keyring-runtime
        mountPath: /var/lib/salt/gpgkeys
