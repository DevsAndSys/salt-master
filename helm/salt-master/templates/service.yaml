{{- $isNodePort := eq .Values.service.type "NodePort" -}}
{{- $nodePortEnabled := and $isNodePort .Values.service.nodePort.enabled -}}
{{- if $nodePortEnabled -}}
{{- $npPublish := int .Values.service.nodePort.publish -}}
{{- $npReturn := int .Values.service.nodePort.return -}}
{{- if or (lt $npPublish 30000) (gt $npPublish 32767) -}}
{{- fail "values.service.nodePort.publish must be in Kubernetes NodePort range (30000-32767)" -}}
{{- end -}}
{{- if or (lt $npReturn 30000) (gt $npReturn 32767) -}}
{{- fail "values.service.nodePort.return must be in Kubernetes NodePort range (30000-32767)" -}}
{{- end -}}
{{- end -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "salt-master.fullname" . }}
  labels:
    {{- include "salt-master.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if or (eq .Values.service.type "NodePort") (eq .Values.service.type "LoadBalancer") }}
  externalTrafficPolicy: {{ .Values.service.externalTrafficPolicy }}
  {{- end }}
  {{- if and (eq .Values.service.type "LoadBalancer") (gt (len .Values.service.loadBalancer.sourceRanges) 0) }}
  loadBalancerSourceRanges:
    {{- toYaml .Values.service.loadBalancer.sourceRanges | nindent 4 }}
  {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "salt-master.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: publish
      port: {{ .Values.service.internalPublishPort }}
      targetPort: publish
      protocol: TCP
      {{- if $nodePortEnabled }}
      nodePort: {{ .Values.service.nodePort.publish }}
      {{- end }}
    - name: ret
      port: {{ .Values.service.internalReturnPort }}
      targetPort: ret
      protocol: TCP
      {{- if $nodePortEnabled }}
      nodePort: {{ .Values.service.nodePort.return }}
      {{- end }}
